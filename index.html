<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virality game| Roblox Game Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050507;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --orange-grad: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%);
            --blue-grad: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --purple-grad: linear-gradient(135deg, #9d50bb 0%, #6e48aa 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: none !important; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; line-height: 1.6; }

        /* --- SMOOTH CURSOR --- */
        #cursor {
            position: fixed; width: 12px; height: 12px; background: #fff;
            border-radius: 50%; pointer-events: none; z-index: 100000;
            box-shadow: 0 0 15px #fff; will-change: transform;
        }
        #cursor-ring {
            position: fixed; width: 40px; height: 40px; border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 50%; pointer-events: none; z-index: 99999;
            will-change: transform;
        }

        .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 80px 0; }

        /* --- STUDIO HEADER --- */
        header { margin-bottom: 60px; text-align: left; }
        header h1 { 
            font-size: clamp(3rem, 10vw, 6rem); font-weight: 800; letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .social-bar { display: flex; gap: 15px; margin-top: 20px; }
        .social-link { 
            padding: 10px 20px; border-radius: 12px; background: var(--glass); 
            border: 1px solid var(--border); color: #fff; text-decoration: none; 
            font-size: 0.85rem; font-weight: 700; transition: 0.3s;
        }
        .social-link:hover { background: #fff; color: #000; }

        /* --- BOX SYSTEM --- */
        .section-title { font-size: 1.8rem; margin-top: 80px; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .section-title span { height: 1px; flex-grow: 1; background: var(--border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 30px; }
        
        .box {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 32px;
            padding: 40px; transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative; overflow: hidden;
        }
        .box:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }
        
        .visual-preview {
            width: 100%; height: 220px; border-radius: 20px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center; font-size: 4rem;
        }

        .btn {
            display: block; width: 100%; padding: 20px; border-radius: 18px;
            text-align: center; font-weight: 800; text-decoration: none; margin-top: 30px;
            transition: 0.3s; font-size: 1rem;
        }
        .btn-play { background: #fff; color: #000; }
        .btn-store { background: var(--glass); color: #fff; border: 1px solid var(--border); }
        .btn:hover { transform: scale(1.03); filter: brightness(1.1); letter-spacing: 1px; }

        /* --- PLAYER REVIEWS --- */
        .reviews-section { background: rgba(255,255,255,0.01); border-radius: 40px; padding: 50px; border: 1px solid var(--border); margin-top: 100px; }
        #reviews-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; 
            max-height: 850px; overflow: hidden; position: relative;
        }
        #reviews-grid.open { max-height: none; }
        
        .review-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; align-self: start;
        }
        .user-info { display: flex; justify-content: space-between; font-weight: 800; color: #ffb800; margin-bottom: 12px; }
        
        .reply-thread { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .reply-item { padding-left: 12px; border-left: 2px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        .reply-item.official b { color: #ff8c00; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        .fade {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 300px;
            background: linear-gradient(transparent, #050507); pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <div class="container">
        <header>
            <h1>VIRALITY</h1>
            <p>Official Roblox Game Studio. High-fidelity experiences for the community.</p>
            <div class="social-bar" id="social-anchor"></div>
        </header>

        <h2 class="section-title">Games <span></span></h2>
        <div class="grid" id="games-container"></div>

        <h2 class="section-title">Store & Gamepasses <span></span></h2>
        <div class="grid" id="store-container"></div>

        <div class="reviews-section">
            <h2 style="margin-bottom: 40px;">Community Audit Log 💬</h2>
            <div id="reviews-grid">
                <div class="fade"></div>
            </div>
            <div style="text-align: center; margin-top: 50px;">
                <button onclick="toggleReviews()" id="load-btn" class="btn btn-play" style="width: auto; padding: 20px 80px;">Expand 5,000+ Reviews</button>
            </div>
        </div>
    </div>

    <script>
        // --- EASY CONFIG ---
        const CONFIG = {
            links: [
                { label: "Roblox Group", url: "https://www.roblox.com/groups/000000" },
                { label: "Twitter / X", url: "https://twitter.com/viralpostdaily1" }
            ],
            games: [
                { name: "rainbow pizza obby", icon: "🍕", link: "https://www.roblox.com/games/139685186353982/", grad: "var(--orange-grad)", info: "Our flagship obby experience. Highly optimized." },
                { name: "evervale RP", icon: "🏠", link: "https://www.roblox.com/games/000000", grad: "var(--blue-grad)", info: "Central hub and social meeting point." }
            ],
            store: [
                { name: "Gravity Coil", icon: "🌀", price: "400 Robux", link: "https://www.roblox.com/game-pass/000000", grad: "var(--blue-grad)" },
                { name: "Speed Coil", icon: "⚡", price: "250 Robux", link: "https://www.roblox.com/game-pass/000000", grad: "var(--purple-grad)" },
                { name: "Golden Pizza", icon: "✨", price: "1,000 Robux", link: "https://www.roblox.com/game-pass/000000", grad: "var(--orange-grad)" }
            ],
            players: ["Opuadm", "whyismyuser4", "BaconGamer", "PizzaFan", "Builderman", "KreekFan", "Guest404", "RobloxPlayer", "DevMaster"],
            comments: [
                "This studio actually cares about quality. 5 stars.",
                "Zero lag even on mobile. Perfectly optimized.",
                "Just copped the Golden Pizza. Worth every Robux!",
                "Best obby I've ever played. Stage 4 is a challenge.",
                "The lighting in the hub is insane. W studio."
            ],
            officialReplies: [
                "Thank you for your feedback. We are committed to maintaining high standards.",
                "We appreciate your support. Our developers are reviewing content for future updates.",
                "Duly noted. Glad you are enjoying the experience.",
                "Thank you for the patronage. Stay tuned for further announcements."
            ],
            userReplies: [
                "For real, stage 4 took me forever!",
                "Agreed, best gamepasses on the platform.",
                "Facts, the optimization is top tier.",
                "Add me if you want to play together!"
            ]
        };

        function init() {
            // Socials
            document.getElementById('social-anchor').innerHTML = CONFIG.links.map(l => `
                <a href="${l.url}" class="social-link">${l.label}</a>
            `).join('');

            // Games
            document.getElementById('games-container').innerHTML = CONFIG.games.map(g => `
                <div class="box">
                    <div class="visual-preview" style="background: ${g.grad}">${g.icon}</div>
                    <h3>${g.name}</h3>
                    <p style="color:#777; margin-top:10px;">${g.info}</p>
                    <a href="${g.link}" class="btn btn-play">Play on Roblox</a>
                </div>
            `).join('');

            // Store
            document.getElementById('store-container').innerHTML = CONFIG.store.map(s => `
                <div class="box" style="text-align: center;">
                    <div class="visual-preview" style="background: ${s.grad}; height: 150px;">${s.icon}</div>
                    <h3>${s.name}</h3>
                    <p style="color:#ffb800; font-weight:800; margin-top:10px;">${s.price}</p>
                    <a href="${s.link}" class="btn btn-store">Buy Gamepass</a>
                </div>
            `).join('');

            // Generate 5,000 Reviews
            const grid = document.getElementById('reviews-grid');
            let html = "";
            for(let i=0; i<5000; i++) {
                const user = CONFIG.players[Math.floor(Math.random()*CONFIG.players.length)] + Math.floor(Math.random()*999);
                html += `
                    <div class="review-card">
                        <div class="user-info"><span>${user}</span><span>★★★★★</span></div>
                        <p style="color:#ccc; font-size:0.9rem;">"${CONFIG.comments[Math.floor(Math.random()*CONFIG.comments.length)]}"</p>
                        <div class="reply-thread">
                            ${Math.random() > 0.4 ? `<div class="reply-item official"><b>Virality Studio</b><br><span style="color:#888;">${CONFIG.officialReplies[Math.floor(Math.random()*CONFIG.officialReplies.length)]}</span></div>` : ''}
                            ${Math.random() > 0.7 ? `<div class="reply-item"><b>${CONFIG.players[Math.floor(Math.random()*CONFIG.players.length)]}</b><br><span style="color:#666;">${CONFIG.userReplies[Math.floor(Math.random()*CONFIG.userReplies.length)]}</span></div>` : ''}
                        </div>
                    </div>
                `;
            }
            grid.innerHTML += html;
        }

        // --- BUTTER SMOOTH CURSOR ---
        const c = document.getElementById('cursor'), r = document.getElementById('cursor-ring');
        let mx = 0, my = 0, cx = 0, cy = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        function animate() {
            cx += (mx - cx) * 0.2; cy += (my - cy) * 0.2;
            rx += (mx - rx) * 0.1; ry += (my - ry) * 0.1;
            c.style.transform = `translate(${cx}px, ${cy}px)`;
            r.style.transform = `translate(${rx - 20}px, ${ry - 20}px)`;
            requestAnimationFrame(animate);
        }
        animate();

        function toggleReviews() {
            const g = document.getElementById('reviews-grid');
            g.classList.toggle('open');
            document.getElementById('load-btn').innerText = g.classList.contains('open') ? "Collapse Log" : "Expand 5,000+ Reviews";
            document.querySelector('.fade').style.display = g.classList.contains('open') ? 'none' : 'block';
        }

        window.onload = init;
    </script>
</body>
</html>
