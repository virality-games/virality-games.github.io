<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        /* Basic setup to remove borders and make full screen */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden; /* No scrolling */
            background: #000; /* Pure black */
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
        }

        /* 1. THE SECRET TEXT (Hidden in the back) */
        .secret-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #3a0000; /* Very dark red - hard to see on black */
            font-size: 5vw; /* Big text */
            font-weight: 900;
            z-index: 1; /* Sits at the bottom */
            white-space: nowrap;
            user-select: none;
            text-shadow: 0 0 10px rgba(50, 0, 0, 0.5);
        }

        /* 2. THE STARS (The Canvas) */
        #space-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2; /* Sits on top of the text */
        }

        /* 3. THE BUTTON (UI) */
        .container {
            position: absolute;
            bottom: 50px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .home-btn {
            color: white;
            text-decoration: none;
            border: 2px solid white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            background: rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .home-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px white;
        }
    </style>
</head>
<body>

    <div class="secret-text">PAGE NOT FOUND.</div>

    <canvas id="space-canvas"></canvas>

    <div class="container">
        <a href="/" class="home-btn">Go Home</a>
    </div>

    <script>
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let comets = [];
        
        // Mouse controls
        const mouse = {
            x: null,
            y: null,
            radius: 60 // Small radius = precise cutting tool
        }

        window.addEventListener('mousemove', function(e){
            mouse.x = e.x;
            mouse.y = e.y;
        });

        // ------------------------------------
        // THE STAR OBJECT
        // ------------------------------------
        class Particle {
            constructor(x, y){
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.homeX = x; // Where it wants to be
                this.homeY = y;
                this.size = Math.random() * 3 + 2; // Bigger stars to hide things better
                this.color = 'white';
            }
            
            draw(){
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update(){
                // Calculate distance from mouse
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                // If mouse is close, push star away
                if (distance < mouse.radius){
                    let forceX = dx / distance;
                    let forceY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    
                    this.x -= forceX * force * 15; // Move fast
                    this.y -= forceY * force * 15;
                } else {
                    // If mouse is far, go home slowly
                    if (this.x !== this.homeX){
                        let dx = this.x - this.homeX;
                        this.x -= dx/10;
                    }
                    if (this.y !== this.homeY){
                        let dy = this.y - this.homeY;
                        this.y -= dy/10;
                    }
                }
            }
        }

        // ------------------------------------
        // THE COMET OBJECT (Random stuff)
        // ------------------------------------
        class Comet {
            constructor(){
                this.reset();
            }
            
            reset(){
                this.x = Math.random() * canvas.width;
                this.y = -50; // Start above screen
                this.speed = Math.random() * 5 + 2;
                this.size = Math.random() * 3;
                this.angle = Math.random() * 0.5; // Slight angle
            }

            update(){
                this.y += this.speed;
                this.x += this.angle;
                if(this.y > canvas.height){
                    this.reset();
                }
            }

            draw(){
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // ------------------------------------
        // SETUP
        // ------------------------------------
        function init(){
            particles = [];
            comets = [];
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 1. Create comets
            for(let i=0; i<5; i++){
                comets.push(new Comet());
            }

            // 2. Setup the "404" text to scan
            let fontSize = 350;
            if(canvas.width < 800) fontSize = 150; // Smaller font for mobile
            
            ctx.fillStyle = 'white';
            ctx.font = '900 ' + fontSize + 'px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('404', canvas.width/2, canvas.height/2);

            // 3. Scan the pixels
            const textData = ctx.getImageData(0,0, canvas.width, canvas.height);
            ctx.clearRect(0,0, canvas.width, canvas.height); // Clear scan

            // 4. Create particles from pixels
            // "step" controls density. Lower number = more particles = harder to see through
            let step = 4; 
            
            for(let y = 0; y < canvas.height; y += step){
                for(let x = 0; x < canvas.width; x += step){
                    // If pixel is not transparent
                    if(textData.data[(y * 4 * textData.width) + (x * 4) + 3] > 128){
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        // ------------------------------------
        // ANIMATION LOOP
        // ------------------------------------
        function animate(){
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Move Comets
            comets.forEach(comet => {
                comet.update();
                comet.draw();
            });

            // Move 404 Particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        // Start it up
        init();
        animate();

        // Fix resizing
        window.addEventListener('resize', function(){
            setTimeout(init, 100);
        });
        
        // Reset mouse when leaving screen
        window.addEventListener('mouseout', function(){
            mouse.x = undefined;
            mouse.y = undefined;
        })

    </script>
</body>
</html>
