<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        /* --- RESET & LAYOUT --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #050505; /* Deepest black */
            height: 100vh;
            width: 100vw;
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- LAYERS --- */
        
        /* Layer 1: The Hidden Text (Bottom) */
        .hidden-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            color: rgba(255, 50, 50, 0.8); /* Red warning color */
            font-family: 'Arial Black', sans-serif;
            font-size: 5vw;
            white-space: nowrap;
            letter-spacing: 5px;
            opacity: 0.6;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            pointer-events: none;
            user-select: none;
            animation: pulse 3s infinite ease-in-out;
        }

        /* Layer 2: The Canvas (Middle - Covers the text) */
        #space-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5; /* Sits ON TOP of the hidden message */
        }

        /* Layer 3: UI (Top) */
        .overlay {
            position: absolute;
            bottom: 10vh;
            left: 0;
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .home-btn {
            pointer-events: auto;
            text-decoration: none;
            color: #fff;
            font-family: sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 3px;
            padding: 15px 50px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 0; /* Boxy sci-fi look */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .home-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
        }

        /* CSS Animation for hidden text */
        @keyframes pulse {
            0%, 100% { opacity: 0.3; filter: blur(2px); }
            50% { opacity: 0.8; filter: blur(0px); }
        }

    </style>
</head>
<body>

    <div class="hidden-message">PAGE NOT FOUND.</div>

    <canvas id="space-canvas"></canvas>

    <div class="overlay">
        <a href="/" class="home-btn">Return Base</a>
    </div>

    <script>
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');

        let particleArray = [];
        let comets = [];
        
        // MOUSE SETTINGS
        const mouse = {
            x: null,
            y: null,
            radius: 70 // SMALLER RADIUS (Precision cutter)
        }

        window.addEventListener('mousemove', function(event){
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // ----------------------------------------
        // CLASS: TEXT PARTICLE (The "404")
        // ----------------------------------------
        class Particle {
            constructor(x, y){
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = x; 
                this.baseY = y;
                // Slightly larger particles to create a better "curtain" to hide text
                this.size = (Math.random() * 2) + 1.5; 
                this.density = (Math.random() * 30) + 1;
                // Icy Blue colors
                const b = Math.floor(Math.random() * 55) + 200;
                this.color = `rgba(200, 230, ${b}, 0.9)`;
            }
            
            draw(){
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update(){
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                
                // Physics: Repulsion
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius){
                    // EXPLODE OUTWARD FAST
                    this.x -= directionX * 8; 
                    this.y -= directionY * 8;
                } else {
                    // MAGNETIC RETURN
                    if (this.x !== this.baseX){
                        let dx = this.x - this.baseX;
                        this.x -= dx/15;
                    }
                    if (this.y !== this.baseY){
                        let dy = this.y - this.baseY;
                        this.y -= dy/15;
                    }
                }
            }
        }

        // ----------------------------------------
        // CLASS: COMET (Random Stuff)
        // ----------------------------------------
        class Comet {
            constructor(){
                this.reset();
            }

            reset(){
                this.x = Math.random() * canvas.width;
                this.y = 0 - Math.random() * 100; // Start above screen
                this.size = Math.random() * 3;
                this.speedX = (Math.random() * -2) + 1; // Slight drift
                this.speedY = (Math.random() * 5) + 3; // Fast down
                this.length = (Math.random() * 80) + 20;
                this.opacity = 0;
                this.fadingIn = true;
            }

            draw(){
                ctx.beginPath();
                // Create a gradient tail
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x - (this.speedX * 5), this.y - this.length);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.size;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - (this.speedX * 5), this.y - this.length);
                ctx.stroke();
            }

            update(){
                this.x += this.speedX;
                this.y += this.speedY;

                // Fade in logic
                if(this.fadingIn){
                    this.opacity += 0.05;
                    if(this.opacity >= 1) this.fadingIn = false;
                }

                // Reset if off screen
                if (this.y > canvas.height + 100){
                    this.reset();
                }
            }
        }

        // ----------------------------------------
        // INITIALIZATION
        // ----------------------------------------
        function init(){
            particleArray = [];
            comets = [];
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 1. Create Comets
            for(let i=0; i<4; i++){
                comets.push(new Comet());
            }

            // 2. Scan Text for "404"
            let fontSize = Math.min(canvas.width / 3, 400); 
            ctx.font = '900 ' + fontSize + 'px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw text temporarily to scan data
            ctx.fillText('404', canvas.width/2, canvas.height/2);
            
            // Define scan area (Optimization)
            const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // Clear the temporary text immediately
            ctx.clearRect(0,0, canvas.width, canvas.height);

            // 3. Create Particles from pixel data
            // Step size: Smaller number = Denser particles = Better hiding of text behind
            let step = 5; 
            if(canvas.width > 2000) step = 8; // Optimization for big screens

            for (let y = 0; y < canvas.height; y += step){
                for(let x = 0; x < canvas.width; x += step){
                    // Check alpha > 50%
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128){
                        particleArray.push(new Particle(x, y));
                    }
                }
            }
        }

        // ----------------------------------------
        // ANIMATION LOOP
        // ----------------------------------------
        function animate(){
            // Clear canvas but keep transparency so we see the DOM text behind
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Comets (Background layer of canvas)
            comets.forEach(comet => {
                comet.draw();
                comet.update();
            });

            // 2. Draw 404 Particles
            for (let i = 0; i < particleArray.length; i++){
                particleArray[i].draw();
                particleArray[i].update();
            }
            requestAnimationFrame(animate);
        }

        // Start
        init();
        animate();

        // Handle Resize
        let resizeTimeout;
        window.addEventListener('resize', function(){
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(init, 100);
        });

        // Mouse out reset
        window.addEventListener('mouseout', function(){
            mouse.x = undefined;
            mouse.y = undefined;
        });

    </script>
</body>
</html>
