<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        /* --- OPTIMIZATION & RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            width: 100vw;
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- CANVAS --- */
        #space-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- UI ELEMENTS --- */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15vh;
        }

        .home-btn {
            pointer-events: auto;
            text-decoration: none;
            color: #fff;
            font-family: sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 2px;
            padding: 15px 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4), inset 0 0 10px rgba(0, 255, 255, 0.2);
            transform: translateY(-2px);
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div class="overlay">
        <a href="/" class="home-btn">Return Home</a>
    </div>

    <script>
        /**
         * SUPER INTERACTIVE SPACE 404
         * Optimized for Performance and 4K Resolution
         */
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');

        let particleArray = [];
        let adjustX = 0;
        let adjustY = 0;

        // handle mouse
        const mouse = {
            x: null,
            y: null,
            radius: 150
        }

        window.addEventListener('mousemove', function(event){
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // Set Text Font Settings
        ctx.fillStyle = 'white';
        ctx.font = '30px Verdana';
        ctx.fillText('404', 0, 30);
        
        function init(){
            particleArray = [];
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // 1. CREATE BACKGROUND STARS
            // Fewer stars, but constant movement for depth
            for(let i=0; i < 400; i++){
                particleArray.push(new Star());
            }

            // 2. CREATE TEXT PARTICLES
            // We draw text on a virtual canvas, scan the pixels, and convert them to particles
            let fontSize = Math.min(canvas.width / 4, 300); // Responsive font size
            let fontX = (canvas.width / 2) - (fontSize * 1.3);
            let fontY = (canvas.height / 2);

            ctx.font = '700 ' + fontSize + 'px sans-serif';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            
            // Draw text to get data
            ctx.fillText('404', 0, fontSize);
            const textCoordinates = ctx.getImageData(0, 0, fontSize * 3, fontSize * 1.5);
            
            // Determine centering offset
            // We scanned a small area, now we project it to center screen
            const offsetX = (canvas.width - (fontSize * 2.2)) / 2;
            const offsetY = (canvas.height - fontSize) / 2;

            // Scan pixel data
            // Step is optimization: skip pixels to increase performance (lower = denser text)
            let step = 4; 
            if(canvas.width > 2000) step = 6; // Optimize for 4K screens

            for (let y = 0, y2 = textCoordinates.height; y < y2; y += step){
                for(let x = 0, x2 = textCoordinates.width; x < x2; x += step){
                    // Check alpha value (opacity) is greater than 128 (roughly 50%)
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128){
                        let positionX = x + offsetX;
                        let positionY = y + offsetY;
                        particleArray.push(new Particle(positionX, positionY));
                    }
                }
            }
        }

        class Star {
            constructor(){
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() * 0.5) - 0.25;
                this.speedY = (Math.random() * 0.5) - 0.25;
                this.isBackground = true;
            }
            update(){
                this.x += this.speedX;
                this.y += this.speedY;
                // Wrap around screen
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw(){
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y){
                this.x = Math.random() * canvas.width; // Start random
                this.y = Math.random() * canvas.height;
                this.baseX = x; // Remember home position
                this.baseY = y;
                this.size = 2; // Particle size
                this.density = (Math.random() * 30) + 1;
                this.color = 'white';
                this.isBackground = false;
                
                // Colors: Cyan to Purple gradients
                const r = Math.floor(Math.random() * 100) + 100;
                const g = Math.floor(Math.random() * 255);
                const b = 255;
                this.color = 'rgb(' + r + ',' + g + ',' + b + ')';
            }
            
            draw(){
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update(){
                // Physics Calculations
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius){
                    // Move away from mouse
                    this.x -= directionX * 3;
                    this.y -= directionY * 3;
                } else {
                    // Return to home position (the text shape)
                    if (this.x !== this.baseX){
                        let dx = this.x - this.baseX;
                        this.x -= dx/10;
                    }
                    if (this.y !== this.baseY){
                        let dy = this.y - this.baseY;
                        this.y -= dy/10;
                    }
                }
            }
        }

        function animate(){
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particleArray.length; i++){
                particleArray[i].draw();
                particleArray[i].update();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Handle Resizing (Debounced slightly for performance)
        let resizeTimeout;
        window.addEventListener('resize', function(){
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function(){
                init();
            }, 100);
        });
        
        // Handle mouse leaving window
        window.addEventListener('mouseout', function(){
            mouse.x = undefined;
            mouse.y = undefined;
        })

    </script>
</body>
</html>
